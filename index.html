<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002FA7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tours" />
    <title>Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#F5F3EF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.6s ease;">
      <img id="splash-logo" src="/icon-512.png" style="width:240px;height:240px;border-radius:52px;box-shadow:0 8px 32px rgba(0,0,0,0.12);" />
      <div id="splash-tagline" style="display:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:#6b6b6b;letter-spacing:0.08em;text-transform:uppercase;"></div>
    </div>
    <script>
      (function() {
        var urlParam = new URLSearchParams(window.location.search).get('user');
        var user = urlParam || localStorage.getItem('app_user') || 'valentina';
        if (user === 'martina') {
          var el = document.getElementById('splash-logo');
          if (el) el.src = '/martina-icon.jpg';
          var tag = document.getElementById('splash-tagline');
          if (tag) { tag.textContent = 'Watch your steps'; tag.style.display = 'block'; }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
